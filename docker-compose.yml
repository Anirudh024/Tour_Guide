version: '3.9'

services:
  web:
    build: .
    container_name: location-analyzer
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      - PYTHONUNBUFFERED=1
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    volumes:
      - ./app.py:/app/app.py
      - ./static:/app/static
      - ./requirements.txt:/app/requirements.txt
    develop:
      watch:
        - path: ./app.py
          action: sync
          target: /app/app.py
        - path: ./static
          action: sync
          target: /app/static
        - path: ./requirements.txt
          action: rebuild
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:8080/', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
