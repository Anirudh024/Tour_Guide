version: '3.8'

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: gemini-video-app
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    volumes:
      - ./static:/app/static
      - ./app.py:/app/app.py
    develop:
      watch:
        - action: sync
          path: ./app.py
          target: /app/app.py
        - action: sync
          path: ./static
          target: /app/static
        - action: rebuild
          path: ./requirements.txt
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/').read()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
